<div class="mat-elevation-z8" style="padding: 40px 20px;">
    <mat-form-field class="example-full-width" style="padding: 0px 10px;">
        <mat-label>Search Product</mat-label>
        <input matInput placeholder="Ex. Shoe" (input)="onSearch($event.target.value)">
    </mat-form-field>

    <mat-form-field style="padding: 0px 10px;">
        <mat-label >Select Category</mat-label>
        <mat-select (valueChange)="onCategoryChange($event)">
            <mat-option [value]="">All</mat-option>
            @for (catagorys of category(); track catagorys._id) {
            <mat-option [value]="catagorys._id">{{catagorys.title}}</mat-option>
            }

        </mat-select>
    </mat-form-field>

    <mat-form-field style="padding: 0px 10px;">
        <mat-label>Page size</mat-label>
        <mat-select (valueChange)="onPageSizeChange($event)">
            <mat-option [value]="5">5</mat-option>
            <mat-option [value]="10">10</mat-option>
            <mat-option [value]="25">25</mat-option>
        </mat-select>
    </mat-form-field>



    <table mat-table [dataSource]="dataSource">

        <!-- Position Column -->
        <!-- <ng-container matColumnDef="catagor">
      <th mat-header-cell *matHeaderCellDef> No. </th>
      <td mat-cell *matCellDef="let element"> {{element.price}} </td>
    </ng-container> -->

        <!-- Name Column -->
        <ng-container matColumnDef="name">
            <th mat-header-cell *matHeaderCellDef> Name </th>
            <td mat-cell *matCellDef="let element"> {{element.name}} </td>
        </ng-container>

        <ng-container matColumnDef="category">
            <th mat-header-cell *matHeaderCellDef> category </th>
            <td mat-cell *matCellDef="let element"> {{element.category.title}} </td>
        </ng-container>


        <!-- Weight Column -->
        <ng-container matColumnDef="price">
            <th mat-header-cell *matHeaderCellDef> price </th>
            <td mat-cell *matCellDef="let element"> {{element.price}} </td>
        </ng-container>

        <!-- Symbol Column -->
        <ng-container matColumnDef="stock">
            <th mat-header-cell *matHeaderCellDef> stock </th>
            <td mat-cell *matCellDef="let element"> {{element.stock}} </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>

    <div class="example-button-row">
        <button matButton="elevated" [disabled]="currentPage() === 1" style="margin: 0px 10px;" (click)="onNextPage(currentPage()-1)">
            Previous
        </button>

        <span>Page {{ currentPage() }} of {{ totalPage() }}</span>

        <button matButton="elevated" [disabled]="currentPage() === totalPage()" style="margin: 0px 10px;" (click)="onNextPage(currentPage()+1)">
            Next
        </button>
    </div>



</div>
